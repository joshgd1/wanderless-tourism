name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          channel: "stable"

      - name: Install dependencies
        run: |
          cd app
          flutter pub get

      - name: Create Android project
        run: |
          cd app
          flutter create --platforms=android .

      - name: Upgrade Kotlin version
        run: |
          cd app/android
          if [ -f settings.gradle.kts ]; then
            sed -i 's/id("org.jetbrains.kotlin.android") version "[^"]*"/id("org.jetbrains.kotlin.android") version "1.9.22"/' settings.gradle.kts
          elif [ -f settings.gradle ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/' settings.gradle
          fi

      - name: Build debug APK
        run: |
          cd app
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: wanderless-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
