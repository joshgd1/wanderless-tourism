name: Build Flutter APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          channel: "stable"

      - name: Install dependencies
        run: |
          cd app
          flutter pub get

      - name: Create Android project
        run: |
          cd app
          flutter create --platforms=android .

      - name: Upgrade Kotlin version
        run: |
          cd app/android
          if [ -f settings.gradle.kts ]; then
            sed -i 's/id("org.jetbrains.kotlin.android") version "[^"]*"/id("org.jetbrains.kotlin.android") version "1.9.22"/' settings.gradle.kts
          elif [ -f settings.gradle ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/' settings.gradle
          fi

      - name: Fix generated test file
        run: |
          mkdir -p app/test
          cat > app/test/widget_test.dart << 'EOF'
import 'package:flutter/material.dart';
import 'package:flutter_test/flutter_test.dart';
import 'package:flutter_riverpod/flutter_riverpod.dart';
import 'package:wanderless/main.dart';

void main() {
  testWidgets('WanderLess app smoke test', (WidgetTester tester) async {
    await tester.pumpWidget(
      const ProviderScope(child: WanderlessApp()),
    );
    expect(find.byType(MaterialApp), findsOneWidget);
  });
}
EOF

      - name: Analyze
        run: |
          cd app
          flutter analyze || true

      - name: Build debug APK
        run: |
          cd app
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: wanderless-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
